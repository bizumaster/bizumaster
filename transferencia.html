<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2R3D803XR7"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-2R3D803XR7');

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transferência - Calculadora</title>

  <link rel="stylesheet" href="../css/style.css">

</head>

  <!-- Cabeçalho -->
  <header>
    <h1>Calculadora de Transferência</h1>
  </header>

  <!-- Conteúdo -->
  <main>

    <section>
      <h2>⚠ Antes de calcular a transferência, preencha o salário na aba “Salário”.</h2>

      <!-- Formulário -->
      <form id="formTransferencia">

        <!-- Veículo -->
        <hr style="margin: 20px 0; border: 1px solid #ccc;">

        <label for="veiculo">Vai ser transferido com veículo?</label>
        <select id="veiculo" required>
          <option value="">Selecione</option>
          <option value="sim">Sim</option>
          <option value="nao">Não</option>
        </select>

        <!-- Opções adicionais -->
        <div id="opcoesVeiculo" style="display:none; margin-top:10px;">
          <label><input type="checkbox" id="carro"> Carro (+12%)</label>
          <label><input type="checkbox" id="moto"> Moto (+3%)</label>
        </div>

        <!-- Origem -->
        <label for="origem">Localidade de origem:</label>
        <select id="origem" required>
          <option value="">Selecione</option>
        </select>

        <!-- Destino -->
        <label for="destino">Localidade de destino:</label>
        <select id="destino" required>
          <option value="">Selecione</option>
        </select>

        <!-- Dependente -->
        <label for="dependente">Tem dependente?</label>
        <select id="dependente" required>
          <option value="">Selecione</option>
          <option value="sim">Sim</option>
          <option value="nao">Não</option>
        </select>

        <!-- Localidade especial -->
        <label for="especial">Origem ou destino é Localidade especial?</label>
        <select id="especial" required>
          <option value="">Selecione</option>
          <option value="sim">Sim</option>
          <option value="nao">Não</option>
        </select>

        <button type="button" id="calcularBtn">Calcular Transferência</button>

      </form>

    </section>

    <section id="resultadoTransferencia" aria-live="polite" style="margin-top:20px;">
    </section>

  </main>

  <!-- Rodapé -->
  <footer>
    <p>&copy; 2025 Sistema de Cálculo Militar - Todos os direitos reservados.</p>
  </footer>

<script src="../js/transferencia.js"></script>

</body>
</html>
