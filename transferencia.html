<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7989785710472721"
     crossorigin="anonymous"></script>
     
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7G25DBR55G"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-7G25DBR55G');
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transferência - Calculadora</title>

  <link rel="stylesheet" href="./css/style.css">

</head>

<body>

<!-- HEADER DINÂMICO -->
<div id="header"></div>

<main>

  <section>
    <h2>Antes de calcular a transferência, preencha o salário na aba “Salário”.</h2>

    <form id="formTransferencia">

      <hr class="separador">

      <label for="veiculo">Vai ser transferido com veículo?</label>
      <select id="veiculo" required>
        <option value="">Selecione</option>
        <option value="sim">Sim</option>
        <option value="nao">Não</option>
      </select>

      <div id="opcoesVeiculo" style="display: none;">
        <label for="tipoVeiculo">Tipo de veículo:</label>
        <select id="tipoVeiculo">
          <option value="">Selecione</option>
          <option value="carro">Carro</option>
          <option value="moto">Moto</option>
          <option value="carro_moto">Carro e Moto</option>
        </select>
      </div>

      <label for="origem">Localidade de origem:</label>
      <select id="origem" required>
        <option value="">Selecione</option>
      </select>

      <label for="destino">Localidade de destino:</label>
      <select id="destino" required>
        <option value="">Selecione</option>
      </select>

      <label for="dependente">Tem dependente?</label>
      <select id="dependente" required>
        <option value="">Selecione</option>
        <option value="sim">Sim</option>
        <option value="nao">Não</option>
      </select>

      <label for="especial">Origem ou destino é Localidade especial?</label>
      <select id="especial" required>
        <option value="">Selecione</option>
        <option value="sim">Sim</option>
        <option value="nao">Não</option>
      </select>

      <button type="button" id="calcularBtn">Calcular Transferência</button>

    </form>
  </section>

  <section id="resultadoTransferencia" aria-live="polite">
  </section>

</main>

<!-- FOOTER DINÂMICO -->
<div id="footer"></div>

<!-- SCRIPT DO LAYOUT -->
<script src="/js/layout.js"></script>

<!-- SCRIPT DO DROPDOWN -->
<script>
function toggleMenu(event) {
  event.preventDefault();
  const dropdown = event.target.closest('.dropdown');
  dropdown.classList.toggle('active');
}
</script>

<!-- SCRIPT DA PÁGINA -->
<script>
document.addEventListener("DOMContentLoaded", function () {
  const veiculoSelect = document.getElementById("veiculo");
  const opcoesVeiculo = document.getElementById("opcoesVeiculo");
  const tipoVeiculo = document.getElementById("tipoVeiculo");

  opcoesVeiculo.style.display = "none";

  veiculoSelect.addEventListener("change", function () {
    if (this.value === "sim") {
      opcoesVeiculo.style.display = "block";
    } else {
      opcoesVeiculo.style.display = "none";
      tipoVeiculo.value = "";
    }
  });
});
</script>

<script src="./js/transferencia.js"></script>

</body>
</html>
