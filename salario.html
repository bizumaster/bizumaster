<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7989785710472721"
     crossorigin="anonymous"></script>
     
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7G25DBR55G"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-7G25DBR55G');
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salário - Calculadora</title>

  <link rel="stylesheet" href="./css/style.css">
</head>

<body>

  <!-- HEADER DINÂMICO -->
  <div id="header"></div>

  <main>
    <section>
      <h2>Preencha os dados</h2>

      <form id="formSalario">
        <label for="ano">Ano de Referência:</label>
        <select id="ano" required>
          <option value="">Selecione</option>
          <option value="2026">2026</option>
        </select>

        <label for="patente">Patente:</label>
        <select id="patente" required>
          <option value="">Selecione</option>
        </select>

        <label for="habilitacao">Adicional de Habilitação:</label>
        <select id="habilitacao" required>
          <option value="">Selecione</option>
        </select>

        <label for="localidade">Adicional de Localidade Especial:</label>
        <select id="localidade" required>
          <option value="">Selecione</option>
        </select>

        <label for="compensacao">Adicional de Compensação Orgânica:</label>
        <select id="compensacao" required>
          <option value="">Selecione</option>
        </select>

        <label for="compensacaoVoo">Compensação Orgânica de Voo:</label>
        <select id="compensacaoVoo" required>
          <option value="">Selecione</option>
        </select>

        <label for="cotasVoo">Cotas de Voo Incorporadas (%):</label>
        <select id="cotasVoo" required>
          <option value="">Selecione</option>
        </select>

        <button type="button" id="btnCalcular">Calcular Salário</button>
      </form>
    </section>

    <section id="resultado" aria-live="polite">
      <!-- Resultado do cálculo aparece aqui -->
    </section>
  </main>

  <!-- FOOTER DINÂMICO -->
  <div id="footer"></div>

  <!-- SCRIPT DO LAYOUT -->
  <script src="/js/layout.js"></script>

  <!-- SCRIPT DA CALCULADORA -->
  <script src="./js/script.js"></script>

  <!-- Script do dropdown -->
  <script>
    function toggleMenu(event) {
      event.preventDefault();
      const dropdown = event.target.closest('.dropdown');
      dropdown.classList.toggle('active');
    }
  </script>

</body>
</html>
