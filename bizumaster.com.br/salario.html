<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <!-- Google tag (gtag.js) -->

  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-2R3D803XR7');

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salário - Calculadora</title>

  <link rel="stylesheet" href="../css/style.css">

</head>
  <!-- Cabeçalho -->
  <header>
    <h1>Calculadora de Salário</h1>
  </header>

  <!-- Conteúdo -->
  <main>
    <section>
      <h2>Preencha os dados</h2>
      <form id="formSalario">
        
        <!-- Ano de Referência -->
        <label for="ano">Ano de Referência:</label>
        <select id="ano" required>
          <option value="">Selecione</option>
          <option value="2026">2026</option>
        </select>

        <!-- Patente -->
        <label for="patente">Patente:</label>
        <select id="patente" required>
          <option value="">Selecione</option>
        </select>

        <!-- Adicional de Habilitação -->
        <label for="habilitacao">Adicional de Habilitação:</label>
        <select id="habilitacao" required>
          <option value="">Selecione</option>
        </select>

        <!-- Adicional de Localidade Especial -->
<label for="localidade">Adicional de Localidade Especial:</label>
<select id="localidade" required>
  <option value="">Selecione</option>
</select>

        <!-- Adicional de Compensação Orgânica -->
<label for="compensacao">Adicional de Compensação Orgânica:</label>
<select id="compensacao" required>
  <option value="">Selecione</option>
</select>

<!-- Compensação Orgânica de Voo -->
<label for="compensacaoVoo">Compensação Orgânica de Voo:</label>
<select id="compensacaoVoo" required>
  <option value="">Selecione</option>
</select>

<!-- Cotas de Voo Incorporadas -->
<label for="cotasVoo">Cotas de Voo Incorporadas (%):</label>
<select id="cotasVoo" required>
  <option value="">Selecione</option>
</select>

        <button type="button" id="btnCalcular">Calcular Salário</button>
      </form>
    </section>

    <section id="resultado" aria-live="polite" style="margin-top:20px;">
      <!-- Resultado do cálculo aparece aqui -->
    </section>
  </main>

  <!-- Rodapé -->
  <footer>
    <p>&copy; 2025 Sistema de Cálculo Militar - Todos os direitos reservados.</p>
  </footer>

  <!-- Script principal -->
  <script src="../js/script.js"></script>
</body>
</html>
